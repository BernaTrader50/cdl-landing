name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - uses: actions/setup-node@v4
      with:
        node-version: '22'
    - name: Install
      run: npm install
    - name: Build (nitro)
      run: LOVABLE_SANDBOX=1 npx cf-vite build
    - name: Deploy
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: cd dist/server && npx wrangler deploy --config wrangler.json
