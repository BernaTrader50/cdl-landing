name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5

    - name: Setup Node 20
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install
      run: npm install

    - name: Build
      run: npx vite build

    - name: Deploy
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      run: |
        node -e "
          const fs = require('fs');
          const c = fs.readFileSync('wrangler.jsonc','utf8');
          fs.writeFileSync('wrangler.jsonc', c.replace('\"main\": \"src/server.ts\"','\"main\": \"dist/server/server.js\"'));
        "
        npx wrangler deploy
        git checkout wrangler.jsonc
